services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: macrotr
      POSTGRES_PASSWORD: macrotr
      POSTGRES_DB: macrotr
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U macrotr -d macrotr"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: ${APP_ENV:-development}
      DEBUG: ${MACROTR_DEBUG:-false}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://macrotr:macrotr@postgres:5432/macrotr}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      EVDS_API_KEY: ${EVDS_API_KEY:-}
      EVDS_BASE_URL: ${EVDS_BASE_URL:-https://evds2.tcmb.gov.tr/service/evds}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      SEED_SAMPLE_DATA: ${SEED_SAMPLE_DATA:-true}
    ports:
      - "${BACKEND_PORT:-8010}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
      VITE_API_PROXY_TARGET: ${VITE_API_PROXY_TARGET:-http://backend:8000}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend

volumes:
  postgres-data:
